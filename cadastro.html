<html lang="en">

    <link rel="stylesheet" href="geral.css">

<body>
    <div id="cadastro">
        <h1>NOTIES</h1>
        <h2>Bem-vindo(a)!</h2>
        <span>Antes de começar a registrar suas ideias, crie uma conta.</span>            

        <form action="" id="form"> 
            <label for="email">Qual e-mail vai usar?<br>
                    <input type="email" name="email" placeholder="examplo@gmail.com">
            </label>
            <label for="senha"> Crie uma senha<br>
                <input type="password" name="senha" placeholder="senha123">
            </label>
            <label for="confirmarsenha"> Confirme a sua senha<br>
                <input type="password" name="confirmarsenha" placeholder="senha123">
            </label>

            <div id="buttons">
                <button class="btn">
                    <a href="cadastro.html">Criar conta</a>
                </button>     
                <button class="cta-btn">
                    <a href="dashboard.html">Entrar</a>
                </button>
            </div>    
        </form>
    </div>
</body>
