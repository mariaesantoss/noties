<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="geral.css" />
    <link rel="stylesheet" href="cadastro.css" />
  </head>
  <body>
    <div id="cadastro">
      <h1>NOTIES</h1>
      <h2>Bem-vindo(a)!</h2>
      <span>Antes de começar a registrar suas ideias, crie uma conta.</span>

      <form action="" id="form">
        <label for="email"
          >Qual e-mail vai usar?<br/>
          <input
            type="email"
            name="email"
            placeholder="exemplo@gmail.com"
            required
          />
        </label>

        <div id="criarconfirmar">
          <label for="senha">
            Crie uma senha<br/>
            <input
              type="password"
              name="senha"
              placeholder="senha123"
              required
            />
          </label>
          <label for="confirmarsenha">
            Confirme a sua senha<br/>
            <input
              type="password"
              name="confirmarsenha"
              placeholder="senha123"
              required
            />
          </label>
        </div>

        <label for="fotoperfil">
          Que tal uma foto de perfil? <br>
          <!-- Input real -->
          <input type="file" id="arquivo" required accept=".jpg,.png,.pdf"/>

          <!-- Label que aciona o input -->
          <label for="arquivo" class="file-label">📂 Escolher arquivo</label>

          <!-- Onde o nome do arquivo será exibido -->
          <span class="file-name" id="file-name">Nenhum arquivo selecionado</span>
        </label>

        <div id="buttons">
          <button class="btn">
            <a href="login.html">Já tenho uma conta</a>
          </button>
          <button type="submit" class="cta-btn">Cadastro</button>
        </div>
      </form>
    </div>

    <script>
        // Atualiza o texto com o nome do arquivo selecionado
        const inputFile = document.getElementById('arquivo');
        const fileName = document.getElementById('file-name');

        inputFile.addEventListener('change', function() {
            if (this.files.length > 0) {
            fileName.textContent = this.files[0].name;
            } else {
            fileName.textContent = "Nenhum arquivo selecionado";
            }
        });
    </script>

    <script src="script.js"></script>
    
  </body>
</html>
