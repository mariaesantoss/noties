<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="login">
        <h1>Lar, doce lar!</h1>
        <form action="" id="form"> 

            <label for="email">Insira seu e-mail:<br>
                    <input type="email" name="email" placeholder="examplo@gmail.com">
            </label>
            <br>
            <label for="senha"> Agora insira a sua senha:<br>
                <input type="password" name="senha" placeholder="senha123">
            </label>
            <br>
            <div id="buttons">
                <button id="cadastrar">Criar conta</button>     
                <button id="entrar">Entrar</button>
            </div>    
        </form>
    </div>
</body>
</html>
