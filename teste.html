<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input File Personalizado</title>
<style>
  /* Esconde o input original */
  input[type="file"] {
    position: absolute;
    left: -9999px; /* Fora da tela */
  }

  /* Botão personalizado */
  .file-label {
    display: inline-block;
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    font-size: 14px;
    font-family: Arial, sans-serif;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  .file-label:hover {
    background-color: #45a049;
  }

  /* Texto do nome do arquivo */
  .file-name {
    margin-left: 10px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    color: #333;
  }
</style>
</head>
<body>

<form>
  <!-- Input real -->
  <input type="file" id="arquivo" accept=".jpg,.png,.pdf">
  
  <!-- Label que aciona o input -->
  <label for="arquivo" class="file-label">📂 Escolher arquivo</label>
  
  <!-- Onde o nome do arquivo será exibido -->
  <span class="file-name" id="file-name">Nenhum arquivo selecionado</span>
</form>

<script>
  // Atualiza o texto com o nome do arquivo selecionado
  const inputFile = document.getElementById('arquivo');
  const fileName = document.getElementById('file-name');

  inputFile.addEventListener('change', function() {
    if (this.files.length > 0) {
      fileName.textContent = this.files[0].name;
    } else {
      fileName.textContent = "Nenhum arquivo selecionado";
    }
  });
</script>

</body>
</html>
